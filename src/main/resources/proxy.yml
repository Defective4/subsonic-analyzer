server:
  host: 0.0.0.0
  port: 8080
  targetURL: https://demo.navidrome.org/
  sslCertPath: null
  sslKeyPath: null
virtLibrary:
  enableVirtualLibrary: true
  generateFromRecents: true
  defaultPlaylistLimit: 30
  fromRecentsIcon: history
  fromRecentsCoverColor: '#00ffff'
  fromRecentsName: From your recent sessions
  fromRecentsIconColor: '#000000'
  defaultPlaylistAuthor: subsonic-analyzer
  defaultPlaylistDescription: Auto-generated by subsonic-analyzer
  playlists:
  - name: Study mix
    mood: study
    icon: book_open
    color: '#00ffff'
    limit: 30
    iconColor: '#000000'
    customFilters: {}
cron:
  enabled: false
  tasks:
    regenerateVirtualLibrary: 0 0 * * *
enableAutoDJ: true
enableManualDynamicPlaylists: true
